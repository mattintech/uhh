name: Feature request
description: Suggest an idea or improvement for uhh
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation that prompted this request — not the solution yet.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like uhh to do?
      description: Describe the behavior or feature you have in mind.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other tools, workflows, or workarounds you've tried.
